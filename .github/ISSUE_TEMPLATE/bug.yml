name: 🐞 Bug
description: Report an issue to help improve the project.
title: '[BUG] Write a small description here'
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A brief description of the question or issue, also include what you tried and what didn't work
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Please add screenshots if applicable
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: '✨ Browser'
      description: 'What browser are you using ?'
      options:
        - Google Chrome
        - Brave
        - Arc
        - Safari
        - Microsoft Edge
        - Mozilla Firefox
        - Other
    validations:
      required: true

  - type: checkboxes
    id: no-duplicate-issues
    attributes:
      label: 'Checklist 🚀'
      options:
        - label: ""
          required: true

        - label: ''
          required: tru

        - label: '.'
          required: false

  - type: markdown
    attributes:
      value: |
        