name: 💡 Feature Request
description: Have a new idea/feature for this project? Please suggest!
title: '[FEATURE] write a small description here'
labels: ['feature']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A brief description of the enhancement you propose, also include what you tried and what worked.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Please add screenshots if applicable
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: '✨ Browser'
      description: 'What browser are you using ?'
      options:
        - Google Chrome
        - Brave
        - Arc
        - Safari
        - Microsoft Edge
        - Mozilla Firefox
        - Other
    validations:
      required: true

  - type: checkboxes
    id: no-duplicate-issues
    attributes:
      label: 'Checklist 🚀'
      options:
        - label: ""
          required: true

        - label: ')'
          required: true

        - label: ''
          required: false

  - type: markdown
    attributes:
      value: |
        