name: Other
description: Use this for any other issues. Please do NOT create blank issues
title: '[OTHER] write a small description here'
body:
  - type: textarea
    id: issuedescription
    attributes:
      label: What would you like to share?
      description: Provide a clear and concise explanation of your issue.
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: '✨ Browser'
      description: 'What browser are you using ?'
      options:
        - Google Chrome
        - Brave
        - Arc
        - Safari
        - Microsoft Edge
        - Mozilla Firefox
        - Other
    validations:
      required: true

  - type: checkboxes
    id: no-duplicate-issues
    attributes:
      label: ''
      options:
        - label: ""
          required: true

        - label: ''
          required: true

        - label: ''
          required: false

  - type: markdown
    attributes:
      value: |
        
